name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Pre-build Clean
        run: |
          rm -rf out
          rm -rf .next
        working-directory: ./aeterna
      - name: Install dependencies
        run: npm ci
        working-directory: ./aeterna
      - name: Build with Next.js
        run: npm run build
        working-directory: ./aeterna
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./aeterna/out
          branch: gh-pages
          clean: true
