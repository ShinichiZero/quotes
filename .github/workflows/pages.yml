name: Deploy via Pages Artifact

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-artifact
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: aeterna/package-lock.json

      - name: Install Dependencies
        run: |
          set -eux
          test -f aeterna/package.json
          if [ -f aeterna/package-lock.json ]; then
            npm ci --prefix aeterna --no-audit --no-fund || npm install --prefix aeterna --no-audit --no-fund
          else
            npm install --prefix aeterna --no-audit --no-fund
          fi

      - name: Build Static Export
        run: npm run build --prefix aeterna

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: aeterna/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4