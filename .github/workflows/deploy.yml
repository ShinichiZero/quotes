name: Deploy Next.js Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: aeterna/package-lock.json

      - name: Pre-build Clean
        run: |
          rm -rf out
          rm -rf .next
        working-directory: ./aeterna

      - name: Install Dependencies
        run: npm ci
        working-directory: ./aeterna

      - name: Build Static Export
        run: npm run build
        working-directory: ./aeterna

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: aeterna/out
          clean: true