name: Deploy Next.js Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: aeterna/package-lock.json

      - name: Pre-build Clean
        run: |
          rm -rf aeterna/out
          rm -rf aeterna/.next

      - name: Install Dependencies
        run: |
          set -eux
          test -f aeterna/package.json
          if [ -f aeterna/package-lock.json ]; then
            npm ci --prefix aeterna --no-audit --no-fund || npm install --prefix aeterna --no-audit --no-fund
          else
            npm install --prefix aeterna --no-audit --no-fund
          fi

      - name: Build Static Export
        run: npm run build --prefix aeterna

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: aeterna/out
          clean: true